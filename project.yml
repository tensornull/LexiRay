name: LexiRay

options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES

targets:
  LexiRay:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: LexiRay
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.tensornull.lexiray
        INFOPLIST_FILE: LexiRay/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: LexiRay/Resources/LexiRay.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: LexiRay/Resources/LexiRay.entitlements
    scheme:
      testTargets:
        - LexiRayTests
  LexiRayTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: LexiRayTests
    dependencies:
      - target: LexiRay
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.tensornull.lexiray.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  LexiRay:
    build:
      targets:
        LexiRay: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - LexiRayTests
    archive:
      config: Release
