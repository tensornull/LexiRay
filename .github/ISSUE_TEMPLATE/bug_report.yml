name: Bug report
description: Report a reproducible LexiRay bug.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Select text in ...
        2. Press ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: LexiRay version or commit
      placeholder: "0.1.2"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "15.0"
    validations:
      required: true
  - type: textarea
    id: permissions
    attributes:
      label: Permissions
      description: Note whether Accessibility, Screen Recording, and Automation are granted.
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Do not include API keys, private selected text, or sensitive screenshots.
    validations:
      required: false
