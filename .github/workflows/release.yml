name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Install tools
        run: brew install xcodegen swiftformat

      - name: Generate project
        run: xcodegen generate

      - name: SwiftFormat lint
        run: swiftformat LexiRay LexiRayTests Package.swift --lint

      - name: Test
        run: |
          xcodebuild test \
            -project LexiRay.xcodeproj \
            -scheme LexiRay \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_COMPILATION_MODE=wholemodule

      - name: Build unsigned app
        run: |
          xcodebuild build \
            -project LexiRay.xcodeproj \
            -scheme LexiRay \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build/DerivedData \
            CONFIGURATION_BUILD_DIR="$PWD/build/release" \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_COMPILATION_MODE=wholemodule

      - name: Build DMG
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          APP_PATH="build/release/LexiRay.app"
          DMG_PATH="build/LexiRay-${TAG_VERSION}.dmg"
          SHA_PATH="build/LexiRay-${TAG_VERSION}.dmg.sha256"

          test -d "$APP_PATH"
          APP_VERSION="$(plutil -extract CFBundleShortVersionString raw -o - "$APP_PATH/Contents/Info.plist")"
          test "$APP_VERSION" = "$TAG_VERSION"

          hdiutil create -volname "LexiRay" -srcfolder "$APP_PATH" -ov -format UDZO "$DMG_PATH"
          hdiutil verify "$DMG_PATH"
          (cd build && shasum -a 256 "LexiRay-${TAG_VERSION}.dmg" > "LexiRay-${TAG_VERSION}.dmg.sha256")
          test -s "$SHA_PATH"

      - name: Upload GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          printf 'LexiRay %s.\n\nThis is an unsigned DMG. macOS Gatekeeper may show a trust warning when opening it.\n' "$TAG_VERSION" > build/release-notes.md

          gh release create "$GITHUB_REF_NAME" \
            "build/LexiRay-${TAG_VERSION}.dmg" \
            "build/LexiRay-${TAG_VERSION}.dmg.sha256" \
            --title "LexiRay ${TAG_VERSION}" \
            --notes-file build/release-notes.md
