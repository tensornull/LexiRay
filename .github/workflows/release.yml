name: Release

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v
        required: true
        type: string
      sha:
        description: Exact main or existing-tag commit SHA
        required: true
        type: string

concurrency:
  group: ${{ github.event_name == 'workflow_dispatch' && 'release-publish' || format('release-pr-{0}', github.event.pull_request.number) }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-ci:
    if: github.event_name == 'pull_request'
    name: release-ci
    runs-on: macos-26
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      pull-requests: write
    steps:
      - name: Checkout release PR
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Require the single release path
        env:
          RELEASE_HEAD: ${{ github.head_ref }}
        run: test "$RELEASE_HEAD" = dev
      - name: Enforce the two-attempt release budget
        env:
          GH_TOKEN: ${{ github.token }}
        run: swift run lexiray-ops release authorize-pr --pr-number "${{ github.event.pull_request.number }}" --head "${{ github.event.pull_request.head.sha }}"
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Build, test, and preflight package
        env:
          GH_TOKEN: ${{ github.token }}
        run: swift run lexiray-ops verify release-pr --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.event.pull_request.head.sha }}" --pr-number "${{ github.event.pull_request.number }}"
      - name: Close an exhausted failed release attempt
        if: failure() && !cancelled()
        env:
          GH_TOKEN: ${{ github.token }}
        run: swift run lexiray-ops release close-failed-pr --pr-number "${{ github.event.pull_request.number }}"

  publish:
    if: github.event_name == 'workflow_dispatch'
    name: publish
    runs-on: macos-26
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout trusted operations code
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          path: ops
      - name: Authorize source commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: swift run --package-path ops lexiray-ops --root ops release authorize --version "${{ inputs.version }}" --sha "${{ inputs.sha }}"
      - name: Checkout exact release source
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.sha }}
          fetch-depth: 0
          path: source
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Build, sign, and verify DMG
        env:
          LEXIRAY_RELEASE_CERT_P12_BASE64: ${{ secrets.LEXIRAY_RELEASE_CERT_P12_BASE64 }}
          LEXIRAY_RELEASE_CERT_PASSWORD: ${{ secrets.LEXIRAY_RELEASE_CERT_PASSWORD }}
        run: swift run --package-path ops lexiray-ops --root source release build --version "${{ inputs.version }}" --sha "${{ inputs.sha }}"
      - name: Create tag and publish verified assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: swift run --package-path ops lexiray-ops --root source release publish --version "${{ inputs.version }}" --sha "${{ inputs.sha }}" --dmg "source/build/LexiRay-${{ inputs.version }}.dmg" --checksum "source/build/LexiRay-${{ inputs.version }}.dmg.sha256"
