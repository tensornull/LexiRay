name: Release Asset Check

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v, for example 0.2.0"
        required: true
        type: string

jobs:
  verify-release-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Resolve release version
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            tag="${{ github.event.release.tag_name }}"
          else
            version="${{ inputs.version }}"
            if [[ "$version" == v* ]]; then
              tag="$version"
            else
              tag="v$version"
            fi
          fi

          version="${tag#v}"
          if [[ -z "$version" || "$tag" != v* ]]; then
            echo "Release tags must use v<version>, got: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >>"$GITHUB_OUTPUT"
          echo "version=$version" >>"$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Verify published release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./script/verify_github_release_assets.sh "${{ steps.release.outputs.version }}"
