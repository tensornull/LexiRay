name: Release Asset Check

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v, for example 0.2.0"
        required: true
        type: string

jobs:
  verify-release-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Resolve release version
        id: release
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ "$EVENT_NAME" == "release" ]]; then
            tag="$EVENT_TAG"
            version="${tag#v}"
          else
            version="$INPUT_VERSION"
            tag="v$version"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ || "$tag" != "v$version" ]]; then
            echo "Release versions must use x.y.z and tags v<version>, got: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >>"$GITHUB_OUTPUT"
          echo "version=$version" >>"$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Verify published release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./script/verify_github_release_assets.sh "${{ steps.release.outputs.version }}"
