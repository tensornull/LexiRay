name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Install tools
        run: brew install xcodegen swiftformat

      - name: Generate project
        run: xcodegen generate

      - name: SwiftFormat lint
        run: swiftformat LexiRay LexiRayTests Package.swift --lint

      - name: Test
        run: |
          xcodebuild test \
            -project LexiRay.xcodeproj \
            -scheme LexiRay \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_COMPILATION_MODE=wholemodule
