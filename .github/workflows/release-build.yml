name: Release Build
run-name: Release Build v${{ inputs.version }} [${{ inputs.state_key }}/${{ inputs.dispatch_id }}]

# Fallback release builder: builds, signs, and packages a private workflow
# artifact from the trusted release commit. It never creates or publishes a
# GitHub Release. Local `script/release.sh status` must re-check the installed
# candidate and Computer Use receipt, download and verify this artifact, then
# explicitly promote it through the draft-release path.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v, for example 0.3.0"
        required: true
        type: string
      state_key:
        description: "Resumable local release state key"
        required: true
        type: string
      dispatch_id:
        description: "Unique local dispatch correlation ID"
        required: true
        type: string

concurrency:
  group: release-build-${{ inputs.state_key }}
  cancel-in-progress: false

jobs:
  build-sign-upload:
    runs-on: macos-26
    permissions:
      actions: read
      contents: read
    steps:
      - name: Resolve tag
        id: resolve
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_STATE_KEY: ${{ inputs.state_key }}
          INPUT_DISPATCH_ID: ${{ inputs.dispatch_id }}
        run: |
          version="$INPUT_VERSION"
          state_key="$INPUT_STATE_KEY"
          dispatch_id="$INPUT_DISPATCH_ID"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "invalid release version: $version" >&2
            exit 1
          fi
          if [[ ! "$dispatch_id" =~ ^[0-9a-f-]{36}$ ]]; then
            echo "invalid dispatch ID: $dispatch_id" >&2
            exit 1
          fi
          tag="v$version"
          main_sha="$(gh api "repos/$GH_REPOSITORY/commits/main" --jq '.sha')"
          tag_sha="$(gh api "repos/$GH_REPOSITORY/commits/$tag" --jq '.sha')"
          if [[ ! "$main_sha" =~ ^[0-9a-f]{40}$ || ! "$tag_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "could not resolve trusted main/tag commit" >&2
            exit 1
          fi
          if [[ "$tag_sha" != "$main_sha" ]]; then
            echo "$tag must point at main before release fallback ($tag_sha != $main_sha)" >&2
            exit 1
          fi
          expected_state_key="$tag-${tag_sha:0:12}"
          if [[ "$state_key" != "$expected_state_key" ]]; then
            echo "invalid release state key: $state_key" >&2
            echo "expected: $expected_state_key" >&2
            exit 1
          fi
          for workflow in ci.yml codeql.yml; do
            gate="$(
              gh run list \
                --repo "$GH_REPOSITORY" \
                --workflow "$workflow" \
                --branch main \
                --event push \
                --commit "$tag_sha" \
                --limit 5 \
                --json status,conclusion,headSha,url \
                --jq '.[0] | [(.status // ""), (.conclusion // ""), (.headSha // ""), (.url // "")] | join("|")'
            )"
            IFS='|' read -r gate_status gate_conclusion gate_sha gate_url <<<"$gate"
            if [[ "$gate_status" != completed || "$gate_conclusion" != success || "$gate_sha" != "$tag_sha" ]]; then
              echo "$workflow is not successful for $tag_sha: ${gate_url:-missing}" >&2
              exit 1
            fi
          done
          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "tag=$tag" >>"$GITHUB_OUTPUT"
          echo "sha=$tag_sha" >>"$GITHUB_OUTPUT"

      - name: Checkout trusted release commit
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.resolve.outputs.sha }}
          fetch-depth: 0

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Install tools
        run: brew install xcodegen

      - name: Build, sign, and package fallback artifact
        env:
          LEXIRAY_RELEASE_ORCHESTRATED: fallback-build
          LEXIRAY_RELEASE_NO_UI: "1"
          LEXIRAY_RELEASE_SOURCE_COMMIT: ${{ steps.resolve.outputs.sha }}
          LEXIRAY_RELEASE_CERT_P12_BASE64: ${{ secrets.LEXIRAY_RELEASE_CERT_P12_BASE64 }}
          LEXIRAY_RELEASE_CERT_PASSWORD: ${{ secrets.LEXIRAY_RELEASE_CERT_PASSWORD }}
        run: ./script/package_release_dmg.sh "${{ steps.resolve.outputs.version }}"

      - name: Upload private fallback artifact
        uses: actions/upload-artifact@v6
        with:
          name: LexiRay-release-${{ inputs.state_key }}-${{ inputs.dispatch_id }}
          path: |
            build/LexiRay-${{ steps.resolve.outputs.version }}.dmg
            build/LexiRay-${{ steps.resolve.outputs.version }}.dmg.sha256
          if-no-files-found: error
          retention-days: 7
